<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - NexusAPI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { brand: '#6C5CE7', darkbg: '#0a0a0f', darksurface: '#13131a' } } } }
</script>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-darkbg text-gray-200 min-h-screen">

<nav class="border-b border-gray-800 bg-darksurface/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<a href="/" class="flex items-center gap-2">
<div class="w-8 h-8 rounded bg-brand flex items-center justify-center font-bold text-white">N</div>
<span class="font-bold text-xl text-white">NexusAPI Admin</span>
</a>
<button onclick="logout()" class="text-sm border border-gray-700 hover:border-gray-500 px-4 py-2 rounded-md transition">Log out</button>
</div>
</div>
</nav>

<div id="not-admin" class="hidden max-w-2xl mx-auto mt-20 text-center">
<p class="text-gray-300">Admin access required.</p>
</div>

<main id="admin-content" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
<div class="bg-darksurface border border-gray-800 rounded-xl p-4">
<p class="text-gray-500 text-sm">Users</p>
<p id="stat-users" class="text-2xl font-bold text-white">-</p>
</div>
<div class="bg-darksurface border border-gray-800 rounded-xl p-4">
<p class="text-gray-500 text-sm">Systems</p>
<p id="stat-systems" class="text-2xl font-bold text-white">-</p>
</div>
<div class="bg-darksurface border border-gray-800 rounded-xl p-4">
<p class="text-gray-500 text-sm">Downloads</p>
<p id="stat-downloads" class="text-2xl font-bold text-white">-</p>
</div>
<div class="bg-darksurface border border-gray-800 rounded-xl p-4">
<p class="text-gray-500 text-sm">Reviews</p>
<p id="stat-reviews" class="text-2xl font-bold text-white">-</p>
</div>
</div>

<div class="flex gap-4 mb-6 border-b border-gray-800">
<button onclick="showTab('users')" id="tab-users" class="pb-3 px-2 border-b-2 border-brand text-white font-medium">Users</button>
<button onclick="showTab('systems')" id="tab-systems" class="pb-3 px-2 border-b-2 border-transparent text-gray-500 font-medium">Systems</button>
<button onclick="showTab('logs')" id="tab-logs" class="pb-3 px-2 border-b-2 border-transparent text-gray-500 font-medium">Audit Log</button>
</div>

<div id="panel-users"><div id="users-list" class="space-y-2"></div></div>
<div id="panel-systems" class="hidden">
<div class="mb-3 flex gap-2">
<button onclick="bulkAction(true)" class="bg-green-700 hover:bg-green-600 text-white text-sm px-3 py-1.5 rounded">Activate Selected</button>
<button onclick="bulkAction(false)" class="bg-red-700 hover:bg-red-600 text-white text-sm px-3 py-1.5 rounded">Deactivate Selected</button>
</div>
<div id="systems-list" class="space-y-2"></div>
</div>
<div id="panel-logs" class="hidden"><div id="logs-list" class="space-y-2"></div></div>

</main>

<script src="/static/app.js"></script>
<script>
if (!isLoggedIn() || getRole() !== 'admin') {
    document.getElementById('not-admin').classList.remove('hidden');
} else {
    document.getElementById('admin-content').classList.remove('hidden');
    loadStats();
    loadUsers();
}

async function loadStats() {
    const s = await apiFetch('/api/v1/admin/stats');
    document.getElementById('stat-users').textContent = s.total_users;
    document.getElementById('stat-systems').textContent = s.total_systems;
    document.getElementById('stat-downloads').textContent = s.total_downloads;
    document.getElementById('stat-reviews').textContent = s.total_reviews;
}

function showTab(name) {
    ['users','systems','logs'].forEach(t => {
        document.getElementById('panel-'+t).classList.toggle('hidden', t !== name);
        document.getElementById('tab-'+t).className = t === name
            ? 'pb-3 px-2 border-b-2 border-brand text-white font-medium'
            : 'pb-3 px-2 border-b-2 border-transparent text-gray-500 font-medium';
    });
    if (name === 'systems') loadSystems();
    if (name === 'logs') loadLogs();
}

async function loadUsers() {
    const data = await apiFetch('/api/v1/admin/users');
    document.getElementById('users-list').innerHTML = data.items.map(u => `
        <div class="bg-darksurface border border-gray-800 rounded-lg p-4 flex justify-between items-center">
            <div>
                <p class="text-white font-medium">${u.name} <span class="text-gray-500 text-sm">(${u.email})</span></p>
                <p class="text-gray-500 text-xs">Role: ${u.role} | Joined: ${u.created_at}</p>
            </div>
            <select onchange="changeRole(${u.id}, this.value)" class="bg-darkbg border border-gray-700 rounded px-2 py-1 text-sm text-white">
                <option value="user" ${u.role==='user'?'selected':''}>user</option>
                <option value="developer" ${u.role==='developer'?'selected':''}>developer</option>
                <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
            </select>
        </div>
    `).join('');
}

async function changeRole(userId, role) {
    await apiFetch(`/api/v1/admin/users/${userId}/role?role=${role}`, { method: 'PUT' });
    showToast('Role updated');
}

async function loadSystems() {
    const data = await apiFetch('/api/v1/admin/systems');
    document.getElementById('systems-list').innerHTML = data.items.map(s => `
        <div class="bg-darksurface border border-gray-800 rounded-lg p-4 flex items-center gap-3">
            <input type="checkbox" class="sys-checkbox" value="${s.id}">
            <div class="flex-grow">
                <p class="text-white font-medium">${s.title} <span class="text-gray-500 text-sm">(${s.slug})</span></p>
                <p class="text-gray-500 text-xs">Owner: ${s.owner_email || 'N/A'} | Downloads: ${s.downloads} | ${s.is_active ? 'Active' : 'Inactive'}</p>
            </div>
        </div>
    `).join('');
}

async function bulkAction(active) {
    const ids = Array.from(document.querySelectorAll('.sys-checkbox:checked')).map(cb => parseInt(cb.value));
    if (ids.length === 0) { showToast('Select at least one system', 'error'); return; }
    await apiFetch('/api/v1/admin/systems/bulk-toggle', {
        method: 'PUT',
        body: JSON.stringify({ system_ids: ids, active })
    });
    showToast(`Updated ${ids.length} systems`);
    loadSystems();
}

async function loadLogs() {
    const data = await apiFetch('/api/v1/admin/audit-logs');
    document.getElementById('logs-list').innerHTML = data.items.map(l => `
        <div class="bg-darksurface border border-gray-800 rounded-lg p-3 text-sm">
            <span class="text-brand">${l.admin_email}</span> did <span class="text-white">${l.action}</span> on ${l.target_type} ${l.target_id || ''} - ${l.details}
            <span class="text-gray-600 text-xs block">${l.created_at}</span>
        </div>
    `).join('');
}
</script>
</body>
</html>
