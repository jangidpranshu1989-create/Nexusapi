<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Dashboard - NexusAPI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { brand: '#6C5CE7', darkbg: '#0a0a0f', darksurface: '#13131a' } } } }
</script>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

<nav class="glass-nav sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<a href="/" class="flex items-center gap-2">
<div class="w-8 h-8 rounded-xl bg-brand flex items-center justify-center font-bold text-white">N</div>
<span class="font-bold text-xl text-white">NexusAPI</span>
</a>
<div class="flex items-center gap-3">
<a href="/profile" class="text-sm text-gray-300 hover:text-white transition">Profile</a>
<button onclick="logout()" class="text-sm border border-gray-700 hover:border-gray-500 px-4 py-2 rounded-xl transition">Log out</button>
</div>
</div>
</div>
</nav>

<main class="flex-grow max-w-4xl mx-auto px-4 py-10 w-full">
    <div class="glass rounded-3xl p-8 card-hover">
        <h1 class="text-3xl font-extrabold text-white mb-2">Developer Dashboard</h1>
        <p class="text-gray-400 mb-8">Submit a new ready-to-deploy backend system.</p>

        <form id="submit-system-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">System Title</label>
                    <input type="text" id="sys-title" class="glass-input w-full px-4 py-3 rounded-xl text-white" placeholder="e.g., URL Shortener API" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Slug (URL friendly)</label>
                    <input type="text" id="sys-slug" class="glass-input w-full px-4 py-3 rounded-xl text-white" placeholder="e.g., url-shortener" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Category</label>
                    <select id="sys-category" class="glass-input w-full px-4 py-3 rounded-xl text-white appearance-none" required>
                        <option value="Authentication" class="bg-darkbg">Authentication</option>
                        <option value="Data Processing" class="bg-darkbg">Data Processing</option>
                        <option value="Utility" class="bg-darkbg">Utility</option>
                        <option value="Machine Learning" class="bg-darkbg">Machine Learning</option>
                        <option value="Other" class="bg-darkbg">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Complexity</label>
                    <select id="sys-complexity" class="glass-input w-full px-4 py-3 rounded-xl text-white appearance-none" required>
                        <option value="Easy" class="bg-darkbg">Easy</option>
                        <option value="Medium" class="bg-darkbg">Medium</option>
                        <option value="Hard" class="bg-darkbg">Hard</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Short Description</label>
                <textarea id="sys-desc" rows="2" class="glass-input w-full px-4 py-3 rounded-xl text-white resize-none" placeholder="What does this system do?" required></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">README (Markdown/Text)</label>
                <textarea id="sys-readme" rows="5" class="glass-input w-full px-4 py-3 rounded-xl text-white resize-none font-mono text-sm" placeholder="Setup instructions, endpoints, etc."></textarea>
            </div>

            <div class="pt-4 border-t border-white/10">
                <button type="submit" id="submit-btn" class="glass-btn-primary w-full py-4 rounded-xl text-white font-bold text-lg">
                    Create Listing
                </button>
            </div>
        </form>
    </div>
</main>

<script src="/static/app.js"></script>
<script>
// Authentication check
if (!localStorage.getItem('token')) {
    window.location.href = '/login';
}

document.getElementById('submit-system-form').addEventListener('submit', async function(e) {
    e.preventDefault(); // BUG FIX: Ye line form ko reload hone se rokegi
    
    const btn = document.getElementById('submit-btn');
    const originalText = btn.textContent;
    btn.textContent = 'Submitting...';
    btn.disabled = true;
    
    const payload = {
        title: document.getElementById('sys-title').value,
        slug: document.getElementById('sys-slug').value,
        category: document.getElementById('sys-category').value,
        complexity: document.getElementById('sys-complexity').value,
        description: document.getElementById('sys-desc').value,
        readme: document.getElementById('sys-readme').value
    };

    try {
        const response = await apiFetch('/api/v1/systems/', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        // Success
        alert('System created successfully! Next step: Upload ZIP in your profile.');
        document.getElementById('submit-system-form').reset();
    } catch (err) {
        alert('Error: ' + err.message);
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
});
</script>
</body>
</html>
