<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Verification - NexusAPI</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#6C5CE7', darkbg: '#0a0a0f', darksurface: '#13131a' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-darkbg text-gray-200 min-h-screen flex flex-col">

    <nav class="border-b border-gray-800 bg-darksurface/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded bg-brand flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(108,92,231,0.5)]">N</div>
                    <span class="font-bold text-xl tracking-tight text-white">NexusAPI</span>
                </a>

                <div id="nav-guest" class="hidden items-center gap-4">
                    <a href="/login" class="text-sm font-medium text-gray-300 hover:text-white transition">Log in</a>
                    <a href="/register" class="text-sm font-medium bg-brand hover:bg-brand/90 text-white px-4 py-2 rounded-md transition shadow-lg shadow-brand/20">Sign up</a>
                </div>

                <div id="nav-auth" class="hidden items-center gap-4">
                    <a href="/developer-verify" class="text-sm font-medium text-brand transition">Dev Portal</a>
                    <button onclick="logout()" class="text-sm font-medium border border-gray-700 hover:border-gray-500 hover:text-white px-4 py-2 rounded-md transition">Log out</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-darksurface border border-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Become a Developer</h2>
            <p class="text-sm text-gray-400 text-center mb-6">Verify your email to unlock the ability to list your own systems.</p>

            <div id="step-request">
                <button id="request-btn" class="w-full bg-brand hover:bg-brand/90 text-white font-medium py-2 px-4 rounded-lg transition shadow-lg shadow-brand/20">
                    Send verification code
                </button>
            </div>

            <div id="step-verify" class="hidden space-y-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Enter 6-digit code</label>
                    <input type="text" id="otp-code" maxlength="6" placeholder="000000" class="w-full bg-darkbg border border-gray-700 rounded-lg px-4 py-2 text-white text-center tracking-[0.5em] text-lg focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition">
                </div>
                <button id="verify-btn" class="w-full bg-brand hover:bg-brand/90 text-white font-medium py-2 px-4 rounded-lg transition shadow-lg shadow-brand/20">
                    Verify
                </button>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = '/login';
        }

        document.getElementById('request-btn').addEventListener('click', async () => {
            const btn = document.getElementById('request-btn');
            const originalText = btn.textContent;

            try {
                btn.innerHTML = '<span class="spinner"></span> Sending...';
                btn.disabled = true;

                await apiFetch('/api/v1/developer/request-verification', {
                    method: 'POST'
                });

                showToast('Verification code sent to your email');
                document.getElementById('step-verify').classList.remove('hidden');
                btn.textContent = 'Resend code';
                btn.disabled = false;

            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        document.getElementById('verify-btn').addEventListener('click', async () => {
            const code = document.getElementById('otp-code').value;
            const btn = document.getElementById('verify-btn');
            const originalText = btn.textContent;

            if (!code || code.length !== 6) {
                showToast('Please enter a valid 6-digit code', 'error');
                return;
            }

            try {
                btn.innerHTML = '<span class="spinner"></span> Verifying...';
                btn.disabled = true;

                await apiFetch('/api/v1/developer/verify', {
                    method: 'POST',
                    body: JSON.stringify({ code })
                });

                showToast('You are now a verified developer!');
                setTimeout(() => { window.location.href = '/'; }, 800);

            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
