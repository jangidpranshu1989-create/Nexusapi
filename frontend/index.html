<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAPI - Browse Systems</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#6C5CE7', darkbg: '#0a0a0f', darksurface: '#13131a' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .pill-btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .pill-active {
            background-color: rgba(108, 92, 231, 0.2);
            color: #6C5CE7;
            border-color: rgba(108, 92, 231, 0.4);
        }
        .pill-inactive {
            background-color: #13131a;
            color: #9CA3AF;
            border-color: #374151;
        }
        .pill-inactive:hover {
            background-color: #1f2937;
            color: #E5E7EB;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-darkbg text-gray-200 min-h-screen flex flex-col">

    <nav class="border-b border-gray-800 bg-darksurface/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded bg-brand flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(108,92,231,0.5)]">N</div>
                    <span class="font-bold text-xl tracking-tight text-white">NexusAPI</span>
                </a>

                <div id="nav-guest" class="hidden items-center gap-4">
                    <a href="/login" class="text-sm font-medium text-gray-300 hover:text-white transition">Log in</a>
                    <a href="/register" class="text-sm font-medium bg-brand hover:bg-brand/90 text-white px-4 py-2 rounded-md transition shadow-lg shadow-brand/20">Sign up</a>
                </div>

                <div id="nav-auth" class="hidden items-center gap-4">
                    <a href="/developer-verify" class="text-sm font-medium text-gray-300 hover:text-brand transition">Dev Portal</a>
                    <button onclick="logout()" class="text-sm font-medium border border-gray-700 hover:border-gray-500 hover:text-white px-4 py-2 rounded-md transition">Log out</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="pt-12 pb-6 px-6 border-b border-gray-800 bg-gradient-to-b from-brand/5 to-darkbg">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">
                Discover Ready-to-Deploy <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand to-teal-400">APIs</span>
            </h1>
            <div class="max-w-2xl mx-auto relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="search-input" placeholder="Search systems by title..." class="w-full pl-11 pr-4 py-3 bg-darksurface border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand shadow-lg transition">
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div id="categories-container" class="flex gap-2 overflow-x-auto pb-2 md:pb-0 w-full md:w-auto">
        </div>

        <div class="flex-shrink-0 w-full md:w-auto flex items-center gap-2">
            <span class="text-sm text-gray-400">Sort by:</span>
            <select id="sort-select" class="bg-darksurface border border-gray-700 rounded-lg text-white px-3 py-1.5 text-sm focus:outline-none focus:border-brand">
                <option value="newest">Newest</option>
                <option value="downloads">Most Downloaded</option>
                <option value="rating">Highest Rated</option>
            </select>
        </div>
    </section>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12 w-full">
        <div id="systems-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full flex justify-center py-20">
                <span class="spinner w-10 h-10 border-4 border-t-brand"></span>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        const categoriesContainer = document.getElementById('categories-container');
        const systemsGrid = document.getElementById('systems-grid');
        const searchInput = document.getElementById('search-input');
        const sortSelect = document.getElementById('sort-select');

        let allLoadedSystems = [];
        let currentCategory = '';
        let currentSort = 'newest';

        async function init() {
            await loadCategories();
            await loadSystems();
        }

        async function loadCategories() {
            try {
                const categories = await apiFetch('/api/v1/categories/');

                let html = `<button onclick="setCategory('')" class="pill-btn ${currentCategory === '' ? 'pill-active' : 'pill-inactive'}">All</button>`;
                categories.forEach(cat => {
                    const isActive = currentCategory === cat.slug;
                    html += `<button onclick="setCategory('${cat.slug}')" class="pill-btn ${isActive ? 'pill-active' : 'pill-inactive'}">${cat.name} (${cat.count})</button>`;
                });
                categoriesContainer.innerHTML = html;
            } catch (err) {
                console.error("Failed to load categories:", err);
            }
        }

        window.setCategory = function(slug) {
            currentCategory = slug;
            loadCategories();
            loadSystems();
        }

        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            loadSystems();
        });

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (!term) {
                renderSystems(allLoadedSystems);
                return;
            }
            const filtered = allLoadedSystems.filter(sys => sys.title.toLowerCase().includes(term));
            renderSystems(filtered);
        });

        async function loadSystems() {
            try {
                systemsGrid.innerHTML = '<div class="col-span-full flex justify-center py-20"><span class="spinner w-10 h-10 border-4 border-t-brand"></span></div>';

                let url = `/api/v1/systems/?sort=${currentSort}`;
                if (currentCategory) url += `&category=${currentCategory}`;

                const data = await apiFetch(url);
                allLoadedSystems = data.items || [];

                searchInput.value = '';
                renderSystems(allLoadedSystems);
            } catch (err) {
                systemsGrid.innerHTML = `<div class="col-span-full text-center text-red-500 py-12 bg-darksurface rounded-xl border border-red-900/50">${err.message}</div>`;
            }
        }

        function renderSystems(systems) {
            if (systems.length === 0) {
                systemsGrid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-20 bg-darksurface rounded-xl border border-gray-800 border-dashed">No systems yet — be the first developer to add one!</div>';
                return;
            }

            systemsGrid.innerHTML = systems.map(sys => {
                const comp = (sys.complexity || '').toLowerCase();
                let compColor = 'bg-gray-800 text-gray-300 border-gray-700';

                if (comp.includes('easy') || comp.includes('beginner') || comp.includes('low')) {
                    compColor = 'bg-green-900/30 text-green-400 border-green-800/50';
                } else if (comp.includes('medium') || comp.includes('intermediate') || comp.includes('moderate')) {
                    compColor = 'bg-yellow-900/30 text-yellow-400 border-yellow-800/50';
                } else if (comp.includes('hard') || comp.includes('advanced') || comp.includes('high')) {
                    compColor = 'bg-red-900/30 text-red-400 border-red-800/50';
                }

                const ratingDisplay = sys.rating ? parseFloat(sys.rating).toFixed(1) : '0.0';

                return `
                <a href="/systems/${sys.slug}" class="block bg-darksurface border border-gray-800 rounded-xl p-6 card-hover flex flex-col h-full relative group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="inline-block px-2.5 py-1 rounded-md text-xs font-semibold bg-brand/10 text-brand border border-brand/20">${sys.category || 'Uncategorized'}</span>
                        <div class="flex items-center gap-1 text-yellow-500 bg-yellow-500/10 px-2 py-1 rounded-md text-sm font-bold">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                            ${ratingDisplay}
                        </div>
                    </div>

                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-brand transition">${sys.title}</h3>

                    <p class="text-gray-400 text-sm mb-6 line-clamp-2 flex-grow">${sys.description || 'No description provided.'}</p>

                    <div class="flex justify-between items-center pt-4 border-t border-gray-800/50">
                        <span class="px-2.5 py-1 rounded-md text-xs font-medium border ${compColor}">${sys.complexity || 'N/A'}</span>
                        <span class="text-xs text-gray-500 flex items-center gap-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            ${sys.downloads || 0} downloads
                        </span>
                    </div>
                </a>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
