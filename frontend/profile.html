<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - NexusAPI</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { brand: '#6C5CE7', darkbg: '#0a0a0f', darksurface: '#13131a' } } } }
</script>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-darkbg text-gray-200 min-h-screen flex flex-col">

<nav class="border-b border-gray-800 bg-darksurface/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<a href="/" class="flex items-center gap-2">
<div class="w-8 h-8 rounded bg-brand flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(108,92,231,0.5)]">N</div>
<span class="font-bold text-xl tracking-tight text-white">NexusAPI</span>
</a>
<div id="nav-guest" class="hidden items-center gap-4">
<a href="/login" class="text-sm font-medium text-gray-300 hover:text-white transition">Log in</a>
<a href="/register" class="text-sm font-medium bg-brand hover:bg-brand/90 text-white px-4 py-2 rounded-md transition shadow-lg shadow-brand/20">Sign up</a>
</div>
<div id="nav-auth" class="hidden items-center gap-4">
<a href="/developer-verify" class="text-sm font-medium text-gray-300 hover:text-brand transition">Dev Portal</a>
<button onclick="logout()" class="text-sm font-medium border border-gray-700 hover:border-gray-500 hover:text-white px-4 py-2 rounded-md transition">Log out</button>
</div>
</div>
</div>
</nav>

<main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

<div id="profile-header" class="bg-darksurface border border-gray-800 rounded-xl p-6 mb-8">
<h1 id="profile-name" class="text-2xl font-bold text-white mb-1"></h1>
<p id="profile-email" class="text-gray-500 text-sm mb-1"></p>
<p id="profile-meta" class="text-gray-500 text-xs"></p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

<div>
<h2 class="text-lg font-bold text-white mb-4">My Systems</h2>
<div id="my-systems-list" class="space-y-3"></div>
</div>

<div>
<h2 class="text-lg font-bold text-white mb-4">My Reviews</h2>
<div id="my-reviews-list" class="space-y-3"></div>
</div>

</div>
</main>

<script src="/static/app.js"></script>
<script>
if (!isLoggedIn()) {
    window.location.href = '/login';
}

async function init() {
    const data = await apiFetch('/api/v1/profile/me');

    document.getElementById('profile-name').textContent = data.user.name;
    document.getElementById('profile-email').textContent = data.user.email;
    document.getElementById('profile-meta').textContent =
        `Role: ${data.user.role} | Member since: ${data.user.created_at} | Total downloads received: ${data.total_downloads_received}`;

    const sysList = document.getElementById('my-systems-list');
    if (data.my_systems.length === 0) {
        sysList.innerHTML = '<p class="text-gray-500 text-sm">You haven\\'t submitted any systems yet.</p>';
    } else {
        sysList.innerHTML = data.my_systems.map(s => `
            <a href="/systems/${s.slug}" class="block bg-darksurface border border-gray-800 rounded-lg p-4 hover:border-brand transition">
                <p class="text-white font-medium">${s.title}</p>
                <p class="text-gray-500 text-xs">${s.downloads} downloads | ★ ${s.rating.toFixed(1)} | ${s.is_active ? 'Active' : 'Inactive'}</p>
            </a>
        `).join('');
    }

    const revList = document.getElementById('my-reviews-list');
    if (data.my_reviews.length === 0) {
        revList.innerHTML = '<p class="text-gray-500 text-sm">You haven\\'t left any reviews yet.</p>';
    } else {
        revList.innerHTML = data.my_reviews.map(r => `
            <a href="/systems/${r.system_slug}" class="block bg-darksurface border border-gray-800 rounded-lg p-4 hover:border-brand transition">
                <p class="text-white font-medium">${r.system_title}</p>
                <p class="text-yellow-400 text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</p>
                <p class="text-gray-500 text-xs mt-1">${r.comment || ''}</p>
            </a>
        `).join('');
    }
}

init();
</script>
</body>
</html>
