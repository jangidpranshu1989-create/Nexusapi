<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Details - NexusAPI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { brand: '#6C5CE7', darkbg: '#0a0a0f', darksurface: '#13131a' } } } }
</script>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="glass-nav sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<a href="/" class="flex items-center gap-2">
<div class="w-8 h-8 rounded-xl bg-brand flex items-center justify-center font-bold text-white shadow-[0_0_20px_rgba(108,92,231,0.6)]">N</div>
<span class="font-bold text-xl tracking-tight text-white">NexusAPI</span>
</a>
<div id="nav-guest" class="hidden items-center gap-3">
<a href="/login" class="text-sm font-medium text-gray-300 hover:text-white transition">Log in</a>
<a href="/register" class="text-sm font-medium glass-btn-primary text-white px-4 py-2 rounded-xl transition">Sign up</a>
</div>
<div id="nav-auth" class="hidden items-center gap-3">
<a href="/settings" class="text-sm font-medium text-gray-300 hover:text-brand transition">Settings</a>
<button onclick="logout()" class="text-sm font-medium border border-gray-700/60 hover:border-gray-500 hover:text-white px-4 py-2 rounded-xl transition">Log out</button>
</div>
</div>
</div>
</nav>

<!-- Main Content -->
<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Left Column: Details & Reviews -->
    <div class="lg:col-span-2 space-y-6">
        <a href="/" class="text-sm text-gray-400 hover:text-brand transition flex items-center gap-2 w-max">
            &larr; Back to Browse
        </a>
        
        <!-- Main Info Glass Card -->
        <div class="glass rounded-2xl p-6 md:p-8 card-hover">
            <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
                <span id="sys-category" class="px-3 py-1 rounded-lg text-xs font-semibold bg-brand/10 text-brand border border-brand/20">Loading...</span>
                <span id="sys-complexity" class="px-3 py-1 rounded-lg text-xs font-medium border border-gray-700 text-gray-300">...</span>
            </div>
            <h1 id="sys-title" class="text-3xl md:text-4xl font-extrabold text-white mb-4 tracking-tight">Loading System...</h1>
            <p id="sys-desc" class="text-gray-300 text-base md:text-lg mb-6 leading-relaxed">Please wait while we fetch the details.</p>
            
            <div class="pt-6 border-t border-white/5">
                <h3 class="text-xl font-semibold text-white mb-4">README</h3>
                <div id="sys-readme" class="text-gray-400 whitespace-pre-wrap font-mono text-sm bg-black/40 p-5 rounded-xl border border-white/5 overflow-x-auto">No detailed instructions provided.</div>
            </div>
        </div>

        <!-- Reviews Glass Card -->
        <div class="glass rounded-2xl p-6 md:p-8">
            <h3 class="text-xl font-semibold text-white mb-6">Reviews & Ratings</h3>
            
            <div id="review-form-container" class="mb-8 hidden bg-black/20 p-5 rounded-xl border border-white/5">
                <h4 class="text-sm font-medium text-white mb-3">Add your review</h4>
                <form id="review-form" class="space-y-4">
                    <div class="flex gap-4">
                        <div class="w-1/3">
                            <label class="block text-xs text-gray-400 mb-1">Rating (1-5)</label>
                            <input type="number" id="review-rating" min="1" max="5" class="glass-input w-full px-3 py-2 rounded-xl text-white" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Comment</label>
                        <textarea id="review-comment" rows="2" class="glass-input w-full px-3 py-2 rounded-xl text-white resize-none" placeholder="What do you think about this system?" required></textarea>
                    </div>
                    <button type="submit" class="glass-btn-primary px-5 py-2 rounded-xl text-white font-medium text-sm">Post Review</button>
                </form>
            </div>
            
            <div id="reviews-list" class="space-y-4">
                <div class="text-center py-6"><span class="spinner"></span></div>
            </div>
        </div>
    </div>

    <!-- Right Column: Stats & Download -->
    <div class="space-y-6">
        <div class="glass rounded-2xl p-6 sticky top-24 card-hover">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand/20 to-teal-400/10 flex items-center justify-center border border-white/5 shadow-inner">
                    <span class="text-yellow-400 text-3xl font-bold drop-shadow-md">★</span>
                </div>
                <div>
                    <div id="sys-rating" class="text-3xl font-extrabold text-white">0.0</div>
                    <div class="text-sm text-gray-400">Average Rating</div>
                </div>
            </div>
            
            <a id="download-btn" href="#" class="flex justify-center items-center gap-2 w-full glass-btn-primary px-4 py-3.5 rounded-xl text-white font-semibold mb-6 text-base">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download ZIP
            </a>
            
            <div class="flex justify-between items-center text-sm border-t border-white/5 pt-4">
                <span class="text-gray-400">Downloads</span>
                <span id="sys-downloads" class="text-white font-medium bg-white/5 px-2.5 py-1 rounded-lg">0</span>
            </div>
        </div>
    </div>
</main>

<script src="/static/app.js"></script>
<script>
// Extract slug from URL (e.g., /systems/url-shortener)
const slug = window.location.pathname.split('/').filter(Boolean).pop();
const reviewForm = document.getElementById('review-form');
const reviewsList = document.getElementById('reviews-list');

async function loadSystemDetails() {
    try {
        const data = await apiFetch(`/api/v1/systems/${slug}`);
        
        document.getElementById('sys-title').textContent = data.title;
        document.getElementById('sys-desc').textContent = data.description || 'No description provided.';
        document.getElementById('sys-category').textContent = data.category || 'Uncategorized';
        document.getElementById('sys-downloads').textContent = data.downloads || 0;
        
        const rating = data.rating ? parseFloat(data.rating).toFixed(1) : '0.0';
        document.getElementById('sys-rating').textContent = rating;
        
        document.getElementById('download-btn').href = `/api/v1/systems/${slug}/download`;
        
        // Handle Complexity styling
        const comp = (data.complexity || '').toLowerCase();
        let compColor = 'border-gray-700 text-gray-300';
        if (comp.includes('easy')) compColor = 'bg-green-500/10 text-green-400 border-green-500/30';
        else if (comp.includes('medium')) compColor = 'bg-yellow-500/10 text-yellow-400 border-yellow-500/30';
        else if (comp.includes('hard')) compColor = 'bg-red-500/10 text-red-400 border-red-500/30';
        
        const compEl = document.getElementById('sys-complexity');
        compEl.textContent = data.complexity || 'N/A';
        compEl.className = `px-3 py-1 rounded-lg text-xs font-medium border ${compColor}`;
        
        if (data.readme) {
            document.getElementById('sys-readme').textContent = data.readme;
        }
        
    } catch (err) {
        document.getElementById('sys-title').textContent = 'System not found';
        document.getElementById('sys-desc').textContent = err.message;
        console.error(err);
    }
}

async function loadReviews() {
    try {
        // Assuming review fetching endpoint format based on standard REST
        const data = await apiFetch(`/api/v1/systems/${slug}/reviews`);
        const reviews = Array.isArray(data) ? data : (data.items || []);
        
        if (reviews.length === 0) {
            reviewsList.innerHTML = '<p class="text-gray-500 italic text-sm">No reviews yet. Be the first to review!</p>';
            return;
        }
        
        reviewsList.innerHTML = reviews.map(r => `
            <div class="border-b border-white/5 pb-4 mb-4 last:border-0 last:pb-0 last:mb-0">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-medium text-gray-300 text-sm">${r.user_name || 'Anonymous'}</span>
                    <span class="text-yellow-400 text-sm font-bold bg-yellow-500/10 px-2 py-0.5 rounded">★ ${r.rating}</span>
                </div>
                <p class="text-gray-400 text-sm">${r.comment}</p>
            </div>
        `).join('');
    } catch (err) {
        reviewsList.innerHTML = '<p class="text-red-400 text-sm">Failed to load reviews.</p>';
    }
}

reviewForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rating = document.getElementById('review-rating').value;
    const comment = document.getElementById('review-comment').value;
    
    try {
        const btn = reviewForm.querySelector('button');
        btn.textContent = 'Posting...';
        btn.disabled = true;
        
        await apiFetch(`/api/v1/systems/${slug}/reviews`, {
            method: 'POST',
            body: JSON.stringify({ rating: parseInt(rating), comment })
        });
        
        document.getElementById('review-rating').value = '';
        document.getElementById('review-comment').value = '';
        await loadReviews();
        await loadSystemDetails(); // Refresh overall rating
        
    } catch (err) {
        alert('Error: ' + err.message);
    } finally {
        const btn = reviewForm.querySelector('button');
        btn.textContent = 'Post Review';
        btn.disabled = false;
    }
});

// Initialize
if (localStorage.getItem('token')) {
    document.getElementById('review-form-container').classList.remove('hidden');
}

loadSystemDetails();
loadReviews();
</script>
</body>
</html>
